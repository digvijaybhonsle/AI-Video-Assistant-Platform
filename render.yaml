services:
  - type: web
    name: ai-video-assistant
    runtime: python
    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

    buildCommand: |
      python --version
      pip install -r requirements.txt

    startCommand: |
      streamlit run app.py --server.port $PORT --server.address 0.0.0.0